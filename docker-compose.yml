version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nest_todo_container
    restart: always
    environment:
      POSTGRES_USER: h3kar360
      POSTGRES_PASSWORD: password
      POSTGRES_DB: simple_todo
    ports:
      - '5232:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
